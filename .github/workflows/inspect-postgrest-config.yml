name: Inspect PostgREST Config

on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: 'Supabase project ref'
        required: true
        type: string

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch PostgREST configuration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ inputs.project_ref }}
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/postgrest")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          if [ "$http_code" -ne 200 ]; then
            echo "::error::API returned HTTP $http_code"
            echo "$body"
            exit 1
          fi

          echo "## PostgREST Configuration — $PROJECT_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"

          echo "$body" | jq -r '
            "| Exposed schemas | `\(.db_schema)` |",
            "| Extra search path | `\(.db_extra_search_path)` |",
            "| Max rows | \(.max_rows) |",
            "| Role claim key | `\(.role_claim_key // ".role")` |"
          ' >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Full PostgREST config JSON</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$body" | jq '.' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
