name: Apply Network Restrictions

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Project config directory name (under projects/)'
        required: true
        type: string
      project_ref:
        description: 'Supabase project ref'
        required: true
        type: string

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate config exists
        run: |
          config="projects/${{ inputs.project_name }}/network.json"
          if [ ! -f "$config" ]; then
            echo "::error::Config file not found: $config"
            exit 1
          fi
          echo "CONFIG_PATH=$config" >> "$GITHUB_ENV"

      - name: Diff and apply network restrictions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ inputs.project_ref }}
        run: |
          api="https://api.supabase.com/v1"
          auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"

          # Get current restrictions
          current=$(curl -s -H "$auth" "$api/projects/$PROJECT_REF/network-restrictions")

          desired=$(cat "$CONFIG_PATH" | jq '{dbAllowedCidrs}')

          echo "## Network Restrictions — ${{ inputs.project_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Current" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$current" | jq '.' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Desired" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$desired" | jq '.' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # Apply restrictions
          result=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "$auth" \
            -H "Content-Type: application/json" \
            -d "$desired" \
            "$api/projects/$PROJECT_REF/network-restrictions/apply")

          result_code=$(echo "$result" | tail -1)
          result_body=$(echo "$result" | sed '$d')

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$result_code" -eq 200 ] || [ "$result_code" -eq 201 ]; then
            echo "### Result: Applied successfully" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Result: Failed (HTTP $result_code)" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            echo "$result_body" | jq '.' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
