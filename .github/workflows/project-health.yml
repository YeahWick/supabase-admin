name: Project Health

on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: 'Supabase project ref (e.g. abcdefghijklmnop)'
        required: true
        type: string

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch project details and health
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ inputs.project_ref }}
        run: |
          api="https://api.supabase.com/v1"
          auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"

          # Fetch project details
          project=$(curl -s -w "\n%{http_code}" -H "$auth" "$api/projects/$PROJECT_REF")
          project_code=$(echo "$project" | tail -1)
          project_body=$(echo "$project" | sed '$d')

          if [ "$project_code" -ne 200 ]; then
            echo "::error::Failed to fetch project (HTTP $project_code)"
            echo "$project_body"
            exit 1
          fi

          # Fetch health
          health=$(curl -s -w "\n%{http_code}" -H "$auth" "$api/projects/$PROJECT_REF/health")
          health_code=$(echo "$health" | tail -1)
          health_body=$(echo "$health" | sed '$d')

          # Project summary
          echo "## Project Details" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "$project_body" | jq -r '"| Name | \(.name) |", "| Ref | `\(.id)` |", "| Region | \(.region) |", "| Status | \(.status) |", "| Created | \(.created_at) |"' >> "$GITHUB_STEP_SUMMARY"

          # Health summary
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Service Health" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$health_code" -eq 200 ]; then
            echo "| Service | Status |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
            echo "$health_body" | jq -r '.[] | "| \(.name) | \(.status) |"' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Failed to fetch health (HTTP $health_code)" >> "$GITHUB_STEP_SUMMARY"
          fi
