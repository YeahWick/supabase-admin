name: Inspect Auth Config

on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: 'Supabase project ref'
        required: true
        type: string

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch auth configuration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ inputs.project_ref }}
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/config/auth")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          if [ "$http_code" -ne 200 ]; then
            echo "::error::API returned HTTP $http_code"
            echo "$body"
            exit 1
          fi

          echo "## Auth Configuration — $PROJECT_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Key settings table
          echo "### Key Settings" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"

          echo "$body" | jq -r '
            "| Signup disabled | \(.disable_signup) |",
            "| Anonymous users | \(.anonymous_users_enabled // "n/a") |",
            "| JWT expiry | \(.jwt_exp)s |",
            "| Site URL | \(.site_url) |",
            "| MFA enabled | \(.mfa_enabled // "n/a") |"
          ' >> "$GITHUB_STEP_SUMMARY"

          # External providers
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### External Providers" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$body" | jq '.external' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # Full config as collapsed details
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Full auth config JSON</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$body" | jq '.' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
