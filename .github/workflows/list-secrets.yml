name: List Secrets

on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: 'Supabase project ref'
        required: true
        type: string

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch project secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ inputs.project_ref }}
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/secrets")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          if [ "$http_code" -ne 200 ]; then
            echo "::error::API returned HTTP $http_code"
            echo "$body"
            exit 1
          fi

          echo "## Project Secrets — $PROJECT_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Name |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|" >> "$GITHUB_STEP_SUMMARY"

          echo "$body" | jq -r '.[].name' | sort | while read -r name; do
            echo "| \`$name\` |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo ""
          echo "Secrets found: $(echo "$body" | jq length)"
