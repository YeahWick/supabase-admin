name: Plan Supabase Changes

on:
  pull_request:
    paths:
      - 'projects/**'
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  workflow_call:
    inputs:
      projects_dir:
        description: 'Directory containing Supabase project subdirectories'
        required: false
        type: string
        default: 'projects'
    secrets:
      SUPABASE_ACCESS_TOKEN:
        description: 'Supabase Personal Access Token'
        required: true

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment'
    outputs:
      should_plan: ${{ steps.check.outputs.should_plan }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      pr_sha: ${{ steps.check.outputs.pr_sha }}
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Check permission and parse command
        id: check
        if: |
          github.event.issue.pull_request &&
          startsWith(github.event.comment.body, '/supa-plan')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENTER: ${{ github.event.comment.user.login }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Check write permission
          permission=$(gh api "repos/${{ github.repository }}/collaborators/$COMMENTER/permission" --jq '.permission' 2>/dev/null || echo "none")
          if [[ "$permission" != "write" && "$permission" != "admin" && "$permission" != "maintain" ]]; then
            echo "::warning::$COMMENTER does not have write access, ignoring /supa-plan"
            echo "should_plan=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get current HEAD SHA of the PR
          pr_sha=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.head.sha')

          echo "should_plan=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_sha=$pr_sha" >> "$GITHUB_OUTPUT"

      - name: React to comment
        if: steps.check.outputs.should_plan == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -X POST -f content='+1'

      - name: Skip (not a /supa-plan comment)
        if: |
          github.event_name == 'issue_comment' &&
          !startsWith(github.event.comment.body, '/supa-plan')
        run: echo "Not a /supa-plan comment, skipping"

  discover:
    runs-on: ubuntu-latest
    needs: check-trigger
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && needs.check-trigger.outputs.should_plan == 'true')
    outputs:
      matrix: ${{ steps.find-projects.outputs.matrix }}
      has_projects: ${{ steps.find-projects.outputs.has_projects }}
      pr_number: ${{ steps.resolve-context.outputs.pr_number }}
      pr_sha: ${{ steps.resolve-context.outputs.pr_sha }}
    steps:
      - name: Resolve context
        id: resolve-context
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "pr_number=${{ needs.check-trigger.outputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "pr_sha=${{ needs.check-trigger.outputs.pr_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "pr_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve-context.outputs.pr_sha }}
          fetch-depth: 0

      - name: Find changed project directories
        id: find-projects
        env:
          PR_NUMBER: ${{ steps.resolve-context.outputs.pr_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ steps.resolve-context.outputs.pr_sha }}
          PROJECTS_DIR: ${{ inputs.projects_dir || 'projects' }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            base_sha=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.base.sha')
          else
            base_sha="${{ github.event.pull_request.base.sha }}"
          fi
          changed=$(git diff --name-only "$base_sha" "$HEAD_SHA" -- "${PROJECTS_DIR}/")
          dirs=$(echo "$changed" | grep -oP "^${PROJECTS_DIR}/[^/]+" | sort -u)

          matrix_entries=""
          count=0

          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            project_json="$dir/project.json"

            if [ ! -f "$project_json" ]; then
              echo "::warning::$dir has changed files but no project.json, skipping"
              continue
            fi

            project_ref=$(jq -r '.project_ref' "$project_json")
            project_name=$(jq -r '.project_name // ""' "$project_json")
            env_name=$(jq -r '.environment // "unknown"' "$project_json")

            if [ -z "$project_ref" ]; then
              echo "::warning::$dir/project.json has no project_ref, skipping"
              continue
            fi

            entry=$(jq -nc \
              --arg dir "$dir" \
              --arg ref "$project_ref" \
              --arg name "$project_name" \
              --arg env "$env_name" \
              '{"dir": $dir, "project_ref": $ref, "project_name": $name, "environment": $env}')

            if [ -n "$matrix_entries" ]; then
              matrix_entries="${matrix_entries},${entry}"
            else
              matrix_entries="$entry"
            fi
            count=$((count + 1))
          done <<< "$dirs"

          echo "matrix={\"include\":[${matrix_entries}]}" >> "$GITHUB_OUTPUT"

          if [ "$count" -gt 0 ]; then
            echo "has_projects=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_projects=false" >> "$GITHUB_OUTPUT"
          fi

  plan:
    needs: discover
    if: needs.discover.outputs.has_projects == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.discover.outputs.pr_sha }}

      - name: Check for missing token
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.discover.outputs.pr_number }}
          PROJECT_REF: ${{ matrix.project_ref }}
          PROJECT_NAME: ${{ matrix.project_name }}
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            header="${PROJECT_NAME:-$PROJECT_REF}"
            if [ "$ENVIRONMENT" != "unknown" ] && [ -n "$ENVIRONMENT" ]; then
              header="$header ($ENVIRONMENT)"
            fi
            gh pr comment "$PR_NUMBER" --body "<!-- supa-plan:${PROJECT_REF} -->
          ## Supabase Plan: ${header}

          **Error: \`SUPABASE_ACCESS_TOKEN\` secret is not set.**

          This workflow needs a Supabase Personal Access Token to read the current project state.

          **To fix:**
          1. Go to [supabase.com/dashboard/account/tokens](https://supabase.com/dashboard/account/tokens) and create a Personal Access Token
          2. In this repo, go to **Settings > Secrets and variables > Actions** and add the token with the exact name:

          \`\`\`
          SUPABASE_ACCESS_TOKEN
          \`\`\`

          Then push a new commit or close and reopen this PR to trigger a new plan."
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Run plan
        id: plan
        uses: yeahwick/supabase-admin@main
        with:
          mode: plan
          project_ref: ${{ matrix.project_ref }}
          config_dir: ${{ matrix.dir }}
          schema_dir: ${{ matrix.dir }}/migrations
          functions_dir: ${{ matrix.dir }}/functions
          plan_output_file: /tmp/plan.json
          supabase_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Build comment markdown
        id: build-comment
        env:
          PLAN_FILE: /tmp/plan.json
          PROJECT_NAME: ${{ matrix.project_name }}
          ENVIRONMENT: ${{ matrix.environment }}
          PROJECT_REF: ${{ matrix.project_ref }}
          PR_SHA: ${{ needs.discover.outputs.pr_sha }}
          HAS_CHANGES: ${{ steps.plan.outputs.has_changes }}
        run: |
          short_sha="${PR_SHA:0:7}"
          comment="<!-- supa-plan:${PROJECT_REF} -->"$'\n'

          if [ -n "$PROJECT_NAME" ]; then
            header="$PROJECT_NAME"
          else
            header="$PROJECT_REF"
          fi
          if [ "$ENVIRONMENT" != "unknown" ] && [ -n "$ENVIRONMENT" ]; then
            header="$header ($ENVIRONMENT)"
          fi

          comment+="## Supabase Plan: ${header}"$'\n'
          comment+="> Planned for commit \`${short_sha}\`"$'\n\n'

          if [ "$HAS_CHANGES" != "true" ]; then
            comment+="Everything is up to date. No changes will be applied on merge."$'\n'
          else
            plan=$(cat "$PLAN_FILE")

            # Config sections with table diffs
            for section in auth postgrest realtime storage-config; do
              nice_name=""
              key="$section"
              case "$section" in
                auth) nice_name="Auth Config" ;;
                postgrest) nice_name="PostgREST Config" ;;
                realtime) nice_name="Realtime Config" ;;
                storage-config) nice_name="Storage Config"; key="storage-config" ;;
              esac

              status=$(echo "$plan" | jq -r ".changes.\"$key\".status // \"absent\"")

              if [ "$status" = "no-change" ]; then
                comment+="### ${nice_name} — no changes"$'\n\n'
              elif [ "$status" = "changed" ]; then
                comment+="### ${nice_name} — :warning: changes detected"$'\n'
                comment+="| Key | Current | Desired |"$'\n'
                comment+="|-----|---------|---------|"$'\n'

                for k in $(echo "$plan" | jq -r ".changes.\"$key\".diff | keys[]"); do
                  current=$(echo "$plan" | jq -c ".changes.\"$key\".diff.\"$k\".current")
                  desired=$(echo "$plan" | jq -c ".changes.\"$key\".diff.\"$k\".desired")
                  comment+="| \`$k\` | \`$current\` | \`$desired\` |"$'\n'
                done
                comment+=$'\n'
              fi
            done

            # Network restrictions
            net_status=$(echo "$plan" | jq -r '.changes.network.status // "absent"')
            if [ "$net_status" = "no-change" ]; then
              comment+="### Network Restrictions — no changes"$'\n\n'
            elif [ "$net_status" = "changed" ]; then
              comment+="### Network Restrictions — :warning: changes detected"$'\n'
              comment+="| Key | Current | Desired |"$'\n'
              comment+="|-----|---------|---------|"$'\n'
              current=$(echo "$plan" | jq -c '.changes.network.diff.dbAllowedCidrs.current')
              desired=$(echo "$plan" | jq -c '.changes.network.diff.dbAllowedCidrs.desired')
              comment+="| \`dbAllowedCidrs\` | \`$current\` | \`$desired\` |"$'\n\n'
            fi

            # SSL enforcement
            ssl_status=$(echo "$plan" | jq -r '.changes.ssl.status // "absent"')
            if [ "$ssl_status" = "no-change" ]; then
              comment+="### SSL Enforcement — no changes"$'\n\n'
            elif [ "$ssl_status" = "changed" ]; then
              comment+="### SSL Enforcement — :warning: changes detected"$'\n'
              current=$(echo "$plan" | jq -c '.changes.ssl.diff.requestedConfig.current')
              desired=$(echo "$plan" | jq -c '.changes.ssl.diff.requestedConfig.desired')
              comment+="| Key | Current | Desired |"$'\n'
              comment+="|-----|---------|---------|"$'\n'
              comment+="| \`requestedConfig\` | \`$current\` | \`$desired\` |"$'\n\n'
            fi

            # Storage buckets
            buckets_status=$(echo "$plan" | jq -r '.changes."storage-buckets".status // "absent"')
            if [ "$buckets_status" = "no-change" ]; then
              comment+="### Storage Buckets — no changes"$'\n\n'
            elif [ "$buckets_status" = "changed" ]; then
              comment+="### Storage Buckets — :warning: changes detected"$'\n'
              comment+="| Bucket | Action | Details |"$'\n'
              comment+="|--------|--------|---------|"$'\n'

              for row in $(echo "$plan" | jq -c '.changes."storage-buckets".buckets[]'); do
                bname=$(echo "$row" | jq -r '.name')
                baction=$(echo "$row" | jq -r '.action')
                if [ "$baction" = "create" ]; then
                  comment+="| \`$bname\` | **create** | — |"$'\n'
                else
                  changes=$(echo "$row" | jq -c '.changes // {}' | sed 's/"/`/g')
                  comment+="| \`$bname\` | update | $changes |"$'\n'
                fi
              done
              comment+=$'\n'
            fi

            # SQL migrations
            mig_status=$(echo "$plan" | jq -r '.changes.migrations.status // "absent"')
            if [ "$mig_status" = "no-change" ]; then
              comment+="### SQL Migrations — no pending"$'\n\n'
            elif [ "$mig_status" = "pending" ]; then
              count=$(echo "$plan" | jq '.changes.migrations.pending | length')
              comment+="### SQL Migrations — :warning: ${count} pending"$'\n'
              for m in $(echo "$plan" | jq -r '.changes.migrations.pending[]'); do
                comment+="- \`$m\`"$'\n'
              done
              comment+=$'\n'
            fi

            # Edge functions
            func_status=$(echo "$plan" | jq -r '.changes.functions.status // "absent"')
            if [ "$func_status" = "no-change" ]; then
              comment+="### Edge Functions — no changes"$'\n\n'
            elif [ "$func_status" = "changed" ]; then
              comment+="### Edge Functions — :warning: changes detected"$'\n'
              comment+="| Function | Action |"$'\n'
              comment+="|----------|--------|"$'\n'
              for row in $(echo "$plan" | jq -c '.changes.functions.functions[]'); do
                fname=$(echo "$row" | jq -r '.name')
                faction=$(echo "$row" | jq -r '.action')
                if [ "$faction" = "create" ]; then
                  comment+="| \`$fname\` | **create** |"$'\n'
                else
                  comment+="| \`$fname\` | update |"$'\n'
                fi
              done
              comment+=$'\n'
            fi

            # Secrets
            sec_status=$(echo "$plan" | jq -r '.changes.secrets.status // "absent"')
            if [ "$sec_status" = "present" ]; then
              sec_count=$(echo "$plan" | jq -r '.changes.secrets.key_count')
              comment+="### Secrets — ${sec_count} key(s) present"$'\n'
              comment+="> Secret values are not diffed. Apply to sync."$'\n\n'
            fi

            comment+="---"$'\n'
            comment+="Comment \`/supa-apply\` to apply these changes, or \`/supa-plan\` to re-run the plan."$'\n'
          fi

          # Write to output using delimiter
          delimiter="EOF_$(date +%s%N)"
          echo "comment_body<<$delimiter" >> "$GITHUB_OUTPUT"
          echo "$comment" >> "$GITHUB_OUTPUT"
          echo "$delimiter" >> "$GITHUB_OUTPUT"

      - name: Find existing bot comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ needs.discover.outputs.pr_number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- supa-plan:${{ matrix.project_ref }} -->'

      - name: Create or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ needs.discover.outputs.pr_number }}
          body: ${{ steps.build-comment.outputs.comment_body }}
          edit-mode: replace
