name: Plan Supabase Changes

on:
  pull_request:
    paths:
      - 'projects/**'
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment'
    outputs:
      should_plan: ${{ steps.trigger.outputs.allowed }}
      pr_number: ${{ steps.trigger.outputs.pr_number }}
      pr_sha: ${{ steps.trigger.outputs.pr_sha }}
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check trigger
        id: trigger
        uses: ./.github/actions/check-trigger
        with:
          command: '/supa-plan'

  discover:
    runs-on: ubuntu-latest
    needs: check-trigger
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && needs.check-trigger.outputs.should_plan == 'true')
    outputs:
      matrix: ${{ steps.find-projects.outputs.matrix }}
      has_projects: ${{ steps.find-projects.outputs.has_projects }}
      pr_number: ${{ steps.resolve-context.outputs.pr_number }}
      pr_sha: ${{ steps.resolve-context.outputs.pr_sha }}
    steps:
      - name: Resolve context
        id: resolve-context
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "pr_number=${{ needs.check-trigger.outputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "pr_sha=${{ needs.check-trigger.outputs.pr_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "pr_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve-context.outputs.pr_sha }}
          fetch-depth: 0

      - name: Find changed project directories
        id: find-projects
        env:
          PR_NUMBER: ${{ steps.resolve-context.outputs.pr_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ steps.resolve-context.outputs.pr_sha }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            base_sha=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.base.sha')
          else
            base_sha="${{ github.event.pull_request.base.sha }}"
          fi
          changed=$(git diff --name-only "$base_sha" "$HEAD_SHA" -- 'projects/')
          dirs=$(echo "$changed" | grep -oP "^projects/[^/]+" | sort -u)

          matrix_entries=""
          count=0

          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            project_json="$dir/project.json"

            if [ ! -f "$project_json" ]; then
              echo "::warning::$dir has changed files but no project.json, skipping"
              continue
            fi

            project_ref=$(jq -r '.project_ref' "$project_json")
            project_name=$(jq -r '.project_name // ""' "$project_json")
            env_name=$(jq -r '.environment // "unknown"' "$project_json")

            if [ -z "$project_ref" ]; then
              echo "::warning::$dir/project.json has no project_ref, skipping"
              continue
            fi

            entry=$(jq -nc \
              --arg dir "$dir" \
              --arg ref "$project_ref" \
              --arg name "$project_name" \
              --arg env "$env_name" \
              '{"dir": $dir, "project_ref": $ref, "project_name": $name, "environment": $env}')

            if [ -n "$matrix_entries" ]; then
              matrix_entries="${matrix_entries},${entry}"
            else
              matrix_entries="$entry"
            fi
            count=$((count + 1))
          done <<< "$dirs"

          echo "matrix={\"include\":[${matrix_entries}]}" >> "$GITHUB_OUTPUT"

          if [ "$count" -gt 0 ]; then
            echo "has_projects=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_projects=false" >> "$GITHUB_OUTPUT"
          fi

  plan:
    needs: discover
    if: needs.discover.outputs.has_projects == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.discover.outputs.pr_sha }}

      - name: Check for missing token
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.discover.outputs.pr_number }}
          PROJECT_REF: ${{ matrix.project_ref }}
          PROJECT_NAME: ${{ matrix.project_name }}
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            header="${PROJECT_NAME:-$PROJECT_REF}"
            if [ "$ENVIRONMENT" != "unknown" ] && [ -n "$ENVIRONMENT" ]; then
              header="$header ($ENVIRONMENT)"
            fi
            gh pr comment "$PR_NUMBER" --body "<!-- supa-plan:${PROJECT_REF} -->
          ## Supabase Plan: ${header}

          **Error: \`SUPABASE_ACCESS_TOKEN\` secret is not set.**

          This workflow needs a Supabase Personal Access Token to read the current project state.

          **To fix:**
          1. Go to [supabase.com/dashboard/account/tokens](https://supabase.com/dashboard/account/tokens) and create a Personal Access Token
          2. In this repo, go to **Settings > Secrets and variables > Actions** and add the token with the exact name:

          \`\`\`
          SUPABASE_ACCESS_TOKEN
          \`\`\`

          Then push a new commit or close and reopen this PR to trigger a new plan."
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Run plan
        id: plan
        uses: ./
        with:
          mode: plan
          project_ref: ${{ matrix.project_ref }}
          config_dir: ${{ matrix.dir }}
          schema_dir: ${{ matrix.dir }}/migrations
          functions_dir: ${{ matrix.dir }}/functions
          plan_output_file: /tmp/plan.json
          plan_comment_file: /tmp/plan-comment.md
          project_name: ${{ matrix.project_name }}
          environment: ${{ matrix.environment }}
          supabase_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Find existing bot comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ needs.discover.outputs.pr_number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- supa-plan:${{ matrix.project_ref }} -->'

      - name: Create or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ needs.discover.outputs.pr_number }}
          body-path: /tmp/plan-comment.md
          edit-mode: replace
