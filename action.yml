name: Apply Supabase Config
description: Applies Supabase project configuration from local JSON files via the Management API. Supports project creation, config management, SQL migrations, storage buckets, secrets, and edge function deployment.
branding:
  icon: settings
  color: green

inputs:
  mode:
    description: 'Action mode: "apply" (default) to configure an existing project, "create" to provision a new project first, or "plan" to preview changes without applying'
    required: false
    default: apply
  project_ref:
    description: 'Supabase project reference ID (not required when mode is "create")'
    required: false
  organization_id:
    description: 'Supabase organization ID (required when mode is "create")'
    required: false
  project_name:
    description: 'Name for the new project (required when mode is "create")'
    required: false
  region:
    description: 'Region for the new project (e.g. us-east-1). Only used when mode is "create"'
    required: false
    default: us-east-1
  db_password:
    description: 'Database password for the new project (required when mode is "create")'
    required: false
  config_dir:
    description: 'Directory containing config JSON files'
    required: false
    default: .supabase
  schema_dir:
    description: 'Directory containing .sql migration files to apply in sorted order'
    required: false
  secrets_file:
    description: 'Path to JSON file containing secrets to push to the project'
    required: false
  secrets:
    description: 'JSON string of secrets to push (e.g. {"KEY": "value"}). Takes precedence over secrets_file.'
    required: false
    default: ''
  functions_dir:
    description: 'Directory containing edge function subdirectories to deploy'
    required: false
  plan_output_file:
    description: 'Path to write JSON plan output. Only used when mode is "plan"'
    required: false
    default: ''
  plan_comment_file:
    description: 'Path to write markdown plan comment (for posting to PRs). Only used when mode is "plan". Requires plan_output_file to also be set.'
    required: false
    default: ''
  project_name:
    description: 'Project name for plan comment header (shown in PR comments)'
    required: false
    default: ''
  environment:
    description: 'Environment label for plan comment header (e.g. staging, production)'
    required: false
    default: ''
  delete:
    description: 'When "true", plan/apply will destroy the project (DELETE /v1/projects/<ref>) and skip all config steps'
    required: false
    default: 'false'
  supabase_token:
    description: 'Supabase Personal Access Token (PAT)'
    required: true

outputs:
  project_ref:
    description: 'Supabase project reference ID'
    value: ${{ steps.resolve-ref.outputs.project_ref }}
  project_url:
    description: 'Project API URL (https://<ref>.supabase.co)'
    value: ${{ steps.fetch-outputs.outputs.project_url }}
  anon_key:
    description: 'Public anon API key'
    value: ${{ steps.fetch-outputs.outputs.anon_key }}
  service_role_key:
    description: 'Service role API key'
    value: ${{ steps.fetch-outputs.outputs.service_role_key }}
  has_changes:
    description: 'Whether the plan detected any changes (only set in plan mode)'
    value: ${{ steps.assemble-plan.outputs.has_changes }}

runs:
  using: composite
  steps:

    # ── Step 0: Create project (if mode is "create") ─────────────────────
    - name: Create Supabase project
      id: create-project
      if: ${{ inputs.mode == 'create' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        ORG_ID: ${{ inputs.organization_id }}
        PROJECT_NAME: ${{ inputs.project_name }}
        REGION: ${{ inputs.region }}
        DB_PASSWORD: ${{ inputs.db_password }}
      run: |
        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"

        if [ -z "$ORG_ID" ] || [ -z "$PROJECT_NAME" ] || [ -z "$DB_PASSWORD" ]; then
          echo "::error::mode 'create' requires organization_id, project_name, and db_password inputs"
          exit 1
        fi

        payload=$(jq -n \
          --arg name "$PROJECT_NAME" \
          --arg org "$ORG_ID" \
          --arg region "$REGION" \
          --arg pass "$DB_PASSWORD" \
          '{name: $name, organization_id: $org, region: $region, db_pass: $pass}')

        result=$(curl -s -w "\n%{http_code}" \
          -X POST \
          -H "$auth" \
          -H "Content-Type: application/json" \
          -d "$payload" \
          "$api/projects")

        code=$(echo "$result" | tail -1)
        body=$(echo "$result" | sed '$d')

        if [ "$code" -ne 201 ] && [ "$code" -ne 200 ]; then
          echo "::error::Failed to create project (HTTP $code)"
          echo "$body"
          exit 1
        fi

        ref=$(echo "$body" | jq -r '.id')
        echo "::notice::Project created with ref: $ref"
        echo "project_ref=$ref" >> "$GITHUB_OUTPUT"

        # Poll health until all services are ACTIVE_HEALTHY (timeout 10 min)
        echo "Waiting for project to become healthy..."
        deadline=$((SECONDS + 600))
        while [ $SECONDS -lt $deadline ]; do
          health=$(curl -s \
            -H "$auth" \
            "$api/projects/$ref/health")

          all_healthy=true
          for status in $(echo "$health" | jq -r '.[].status'); do
            if [ "$status" != "ACTIVE_HEALTHY" ]; then
              all_healthy=false
              break
            fi
          done

          if [ "$all_healthy" = true ] && [ "$(echo "$health" | jq length)" -gt 0 ]; then
            echo "::notice::All services are healthy"
            break
          fi

          echo "  Services not yet healthy, waiting 10s..."
          sleep 10
        done

        if [ "$all_healthy" != true ]; then
          echo "::warning::Project created but some services may not be healthy yet"
        fi

    # ── Step 1: Resolve effective project_ref ────────────────────────────
    - name: Resolve project ref
      id: resolve-ref
      shell: bash
      env:
        INPUT_REF: ${{ inputs.project_ref }}
        CREATED_REF: ${{ steps.create-project.outputs.project_ref }}
        MODE: ${{ inputs.mode }}
      run: |
        if [ "$MODE" = "create" ] && [ -n "$CREATED_REF" ]; then
          ref="$CREATED_REF"
        elif [ -n "$INPUT_REF" ]; then
          ref="$INPUT_REF"
        elif [ "$MODE" = "plan" ]; then
          # Plan mode allows missing ref — it means "project will be created"
          ref=""
        else
          echo "::error::project_ref is required when mode is 'apply'"
          exit 1
        fi
        echo "project_ref=$ref" >> "$GITHUB_OUTPUT"
        if [ -n "$ref" ]; then
          echo "::notice::Using project ref: $ref"
        else
          echo "::notice::No project ref provided (plan mode: project will be created)"
        fi

    # ── Init: Set up plan parts directory ────────────────────────────────
    - name: Init plan output
      if: ${{ inputs.mode == 'plan' }}
      shell: bash
      run: |
        mkdir -p /tmp/plan-parts

    # ── Step 1b: Determine project state for plan mode ───────────────────
    # Sets PROJECT_EXISTS and PROJECT_ACTION env vars used by subsequent steps.
    # PROJECT_ACTION = create | update | delete
    - name: Determine project state
      if: ${{ inputs.mode == 'plan' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
        DELETE: ${{ inputs.delete }}
      run: |
        if [ "$DELETE" = "true" ]; then
          if [ -z "$PROJECT_REF" ]; then
            echo "::error::delete=true requires a project_ref to know what to delete"
            exit 1
          fi
          echo "PROJECT_EXISTS=true" >> "$GITHUB_ENV"
          echo "PROJECT_ACTION=delete" >> "$GITHUB_ENV"
          echo '{"action":"delete","project_ref":"'"$PROJECT_REF"'"}' > /tmp/plan-parts/_project.json
          echo "::notice::Plan: project $PROJECT_REF will be DELETED"
          exit 0
        fi

        if [ -z "$PROJECT_REF" ]; then
          echo "PROJECT_EXISTS=false" >> "$GITHUB_ENV"
          echo "PROJECT_ACTION=create" >> "$GITHUB_ENV"
          echo '{"action":"create"}' > /tmp/plan-parts/_project.json
          echo "::notice::Plan: project will be CREATED (no ref provided)"
          exit 0
        fi

        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "$auth" "$api/projects/$PROJECT_REF")

        if [ "$code" -eq 200 ]; then
          echo "PROJECT_EXISTS=true" >> "$GITHUB_ENV"
          echo "PROJECT_ACTION=update" >> "$GITHUB_ENV"
          echo '{"action":"update","project_ref":"'"$PROJECT_REF"'"}' > /tmp/plan-parts/_project.json
          echo "::notice::Plan: project $PROJECT_REF exists, diffing config"
        else
          echo "PROJECT_EXISTS=false" >> "$GITHUB_ENV"
          echo "PROJECT_ACTION=create" >> "$GITHUB_ENV"
          echo '{"action":"create","attempted_ref":"'"$PROJECT_REF"'"}' > /tmp/plan-parts/_project.json
          echo "::notice::Plan: project ref $PROJECT_REF does not exist (HTTP $code), planning as CREATE"
        fi

    # ── Apply mode: handle delete ────────────────────────────────────────
    - name: Delete project
      if: ${{ inputs.mode == 'apply' && inputs.delete == 'true' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
      run: |
        if [ -z "$PROJECT_REF" ]; then
          echo "::error::delete=true requires a project_ref"
          exit 1
        fi
        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"
        result=$(curl -s -w "\n%{http_code}" -X DELETE -H "$auth" "$api/projects/$PROJECT_REF")
        code=$(echo "$result" | tail -1)
        body=$(echo "$result" | sed '$d')
        if [ "$code" -eq 200 ] || [ "$code" -eq 204 ]; then
          echo "::notice::Project $PROJECT_REF deleted"
        else
          echo "::error::Failed to delete project (HTTP $code)"
          echo "$body"
          exit 1
        fi

    # ── Step 2: Auth config ──────────────────────────────────────────────
    - name: Apply auth config
      if: ${{ hashFiles(format('{0}/auth.json', inputs.config_dir)) != '' && inputs.delete != 'true' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
        CONFIG_DIR: ${{ inputs.config_dir }}
        MODE: ${{ inputs.mode }}
      run: |
        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"
        desired=$(jq -S '.' "${CONFIG_DIR}/auth.json")

        # Plan mode: project doesn't exist → emit create plan, skip API
        if [ "$MODE" = "plan" ] && [ "$PROJECT_EXISTS" = "false" ]; then
          jq -n --argjson desired "$desired" '{"status":"create","desired":$desired}' > /tmp/plan-parts/auth.json
          echo "::notice::Auth config: will be created with project"
          exit 0
        fi

        # Fetch current state
        current_result=$(curl -s -w "\n%{http_code}" -H "$auth" "$api/projects/$PROJECT_REF/config/auth")
        current_code=$(echo "$current_result" | tail -1)
        current_body=$(echo "$current_result" | sed '$d')

        if [ "$current_code" -ne 200 ]; then
          echo "::error::Failed to fetch current auth config (HTTP $current_code)"
          echo "$current_body"
          exit 1
        fi

        # Compare only keys present in desired config
        current_trimmed=$(echo "$current_body" | jq -S --argjson d "$desired" '
          . as $full | $d | keys_unsorted | reduce .[] as $k ({}; . + {($k): $full[$k]})')

        if [ "$desired" = "$current_trimmed" ]; then
          echo "::notice::Auth config: no changes"
          if [ "$MODE" = "plan" ]; then
            echo '{"status":"no-change"}' > /tmp/plan-parts/auth.json
          fi
          exit 0
        fi

        # Build diff of changed keys
        diff_json=$(jq -n --argjson desired "$desired" --argjson current "$current_trimmed" '
          [$desired | keys[] | select($desired[.] != $current[.])] |
          reduce .[] as $k ({}; . + {($k): {"current": $current[$k], "desired": $desired[$k]}})')

        if [ "$MODE" = "plan" ]; then
          jq -n --argjson diff "$diff_json" '{"status":"changed","diff":$diff}' > /tmp/plan-parts/auth.json
          echo "::notice::Auth config: changes detected (plan mode, not applying)"
          exit 0
        fi

        # Apply
        result=$(curl -s -w "\n%{http_code}" \
          -X PATCH -H "$auth" -H "Content-Type: application/json" \
          -d "$desired" "$api/projects/$PROJECT_REF/config/auth")

        code=$(echo "$result" | tail -1)
        body=$(echo "$result" | sed '$d')

        if [ "$code" -eq 200 ]; then
          echo "::notice::Auth config applied successfully"
        else
          echo "::error::Failed to apply auth config (HTTP $code)"
          echo "$body"
          exit 1
        fi

    # ── Step 3: PostgREST config ─────────────────────────────────────────
    - name: Apply postgrest config
      if: ${{ hashFiles(format('{0}/postgrest.json', inputs.config_dir)) != '' && inputs.delete != 'true' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
        CONFIG_DIR: ${{ inputs.config_dir }}
        MODE: ${{ inputs.mode }}
      run: |
        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"
        desired=$(jq -S '.' "${CONFIG_DIR}/postgrest.json")

        if [ "$MODE" = "plan" ] && [ "$PROJECT_EXISTS" = "false" ]; then
          jq -n --argjson desired "$desired" '{"status":"create","desired":$desired}' > /tmp/plan-parts/postgrest.json
          echo "::notice::PostgREST config: will be created with project"
          exit 0
        fi

        current_result=$(curl -s -w "\n%{http_code}" -H "$auth" "$api/projects/$PROJECT_REF/postgrest")
        current_code=$(echo "$current_result" | tail -1)
        current_body=$(echo "$current_result" | sed '$d')

        if [ "$current_code" -ne 200 ]; then
          echo "::error::Failed to fetch current PostgREST config (HTTP $current_code)"
          echo "$current_body"
          exit 1
        fi

        current_trimmed=$(echo "$current_body" | jq -S --argjson d "$desired" '
          . as $full | $d | keys_unsorted | reduce .[] as $k ({}; . + {($k): $full[$k]})')

        if [ "$desired" = "$current_trimmed" ]; then
          echo "::notice::PostgREST config: no changes"
          if [ "$MODE" = "plan" ]; then
            echo '{"status":"no-change"}' > /tmp/plan-parts/postgrest.json
          fi
          exit 0
        fi

        diff_json=$(jq -n --argjson desired "$desired" --argjson current "$current_trimmed" '
          [$desired | keys[] | select($desired[.] != $current[.])] |
          reduce .[] as $k ({}; . + {($k): {"current": $current[$k], "desired": $desired[$k]}})')

        if [ "$MODE" = "plan" ]; then
          jq -n --argjson diff "$diff_json" '{"status":"changed","diff":$diff}' > /tmp/plan-parts/postgrest.json
          echo "::notice::PostgREST config: changes detected (plan mode, not applying)"
          exit 0
        fi

        result=$(curl -s -w "\n%{http_code}" \
          -X PATCH -H "$auth" -H "Content-Type: application/json" \
          -d "$desired" "$api/projects/$PROJECT_REF/postgrest")

        code=$(echo "$result" | tail -1)
        body=$(echo "$result" | sed '$d')

        if [ "$code" -eq 200 ]; then
          echo "::notice::PostgREST config applied successfully"
        else
          echo "::error::Failed to apply PostgREST config (HTTP $code)"
          echo "$body"
          exit 1
        fi

    # ── Step 4: Network restrictions ─────────────────────────────────────
    - name: Apply network restrictions
      if: ${{ hashFiles(format('{0}/network.json', inputs.config_dir)) != '' && inputs.delete != 'true' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
        CONFIG_DIR: ${{ inputs.config_dir }}
        MODE: ${{ inputs.mode }}
      run: |
        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"
        desired=$(cat "${CONFIG_DIR}/network.json" | jq -S '{dbAllowedCidrs}')

        if [ "$MODE" = "plan" ] && [ "$PROJECT_EXISTS" = "false" ]; then
          jq -n --argjson desired "$desired" \
            '{"status":"create","diff":{"dbAllowedCidrs":{"current":[],"desired":$desired.dbAllowedCidrs}}}' \
            > /tmp/plan-parts/network.json
          echo "::notice::Network restrictions: will be created with project"
          exit 0
        fi

        current_result=$(curl -s -w "\n%{http_code}" -H "$auth" "$api/projects/$PROJECT_REF/network-restrictions")
        current_code=$(echo "$current_result" | tail -1)
        current_body=$(echo "$current_result" | sed '$d')

        if [ "$current_code" -ne 200 ]; then
          echo "::error::Failed to fetch current network restrictions (HTTP $current_code)"
          echo "$current_body"
          exit 1
        fi

        # Sort CIDR arrays for comparison
        desired_sorted=$(echo "$desired" | jq -S '{dbAllowedCidrs: (.dbAllowedCidrs | sort)}')
        current_sorted=$(echo "$current_body" | jq -S '{dbAllowedCidrs: (.dbAllowedCidrs // [] | sort)}')

        if [ "$desired_sorted" = "$current_sorted" ]; then
          echo "::notice::Network restrictions: no changes"
          if [ "$MODE" = "plan" ]; then
            echo '{"status":"no-change"}' > /tmp/plan-parts/network.json
          fi
          exit 0
        fi

        if [ "$MODE" = "plan" ]; then
          jq -n --argjson desired "$desired_sorted" --argjson current "$current_sorted" \
            '{"status":"changed","diff":{"dbAllowedCidrs":{"current":$current.dbAllowedCidrs,"desired":$desired.dbAllowedCidrs}}}' \
            > /tmp/plan-parts/network.json
          echo "::notice::Network restrictions: changes detected (plan mode, not applying)"
          exit 0
        fi

        result=$(curl -s -w "\n%{http_code}" \
          -X POST -H "$auth" -H "Content-Type: application/json" \
          -d "$desired" "$api/projects/$PROJECT_REF/network-restrictions/apply")

        code=$(echo "$result" | tail -1)
        body=$(echo "$result" | sed '$d')

        if [ "$code" -eq 200 ] || [ "$code" -eq 201 ]; then
          echo "::notice::Network restrictions applied successfully"
        else
          echo "::error::Failed to apply network restrictions (HTTP $code)"
          echo "$body"
          exit 1
        fi

    # ── Step 5: SSL enforcement ──────────────────────────────────────────
    - name: Apply SSL enforcement
      if: ${{ hashFiles(format('{0}/ssl.json', inputs.config_dir)) != '' && inputs.delete != 'true' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
        CONFIG_DIR: ${{ inputs.config_dir }}
        MODE: ${{ inputs.mode }}
      run: |
        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"
        desired=$(cat "${CONFIG_DIR}/ssl.json" | jq -S '{requestedConfig}')

        if [ "$MODE" = "plan" ] && [ "$PROJECT_EXISTS" = "false" ]; then
          jq -n --argjson desired "$desired" \
            '{"status":"create","diff":{"requestedConfig":{"current":null,"desired":$desired.requestedConfig}}}' \
            > /tmp/plan-parts/ssl.json
          echo "::notice::SSL enforcement: will be created with project"
          exit 0
        fi

        current_result=$(curl -s -w "\n%{http_code}" -H "$auth" "$api/projects/$PROJECT_REF/ssl-enforcement")
        current_code=$(echo "$current_result" | tail -1)
        current_body=$(echo "$current_result" | sed '$d')

        if [ "$current_code" -ne 200 ]; then
          echo "::error::Failed to fetch current SSL enforcement (HTTP $current_code)"
          echo "$current_body"
          exit 1
        fi

        current_trimmed=$(echo "$current_body" | jq -S '{requestedConfig}')

        if [ "$desired" = "$current_trimmed" ]; then
          echo "::notice::SSL enforcement: no changes"
          if [ "$MODE" = "plan" ]; then
            echo '{"status":"no-change"}' > /tmp/plan-parts/ssl.json
          fi
          exit 0
        fi

        if [ "$MODE" = "plan" ]; then
          jq -n --argjson desired "$desired" --argjson current "$current_trimmed" \
            '{"status":"changed","diff":{"requestedConfig":{"current":$current.requestedConfig,"desired":$desired.requestedConfig}}}' \
            > /tmp/plan-parts/ssl.json
          echo "::notice::SSL enforcement: changes detected (plan mode, not applying)"
          exit 0
        fi

        result=$(curl -s -w "\n%{http_code}" \
          -X PUT -H "$auth" -H "Content-Type: application/json" \
          -d "$desired" "$api/projects/$PROJECT_REF/ssl-enforcement")

        code=$(echo "$result" | tail -1)
        body=$(echo "$result" | sed '$d')

        if [ "$code" -eq 200 ]; then
          echo "::notice::SSL enforcement applied successfully"
        else
          echo "::error::Failed to apply SSL enforcement (HTTP $code)"
          echo "$body"
          exit 1
        fi

    # ── Step 6: Realtime config ──────────────────────────────────────────
    - name: Apply realtime config
      if: ${{ hashFiles(format('{0}/realtime.json', inputs.config_dir)) != '' && inputs.delete != 'true' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
        CONFIG_DIR: ${{ inputs.config_dir }}
        MODE: ${{ inputs.mode }}
      run: |
        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"
        desired=$(jq -S '.' "${CONFIG_DIR}/realtime.json")

        if [ "$MODE" = "plan" ] && [ "$PROJECT_EXISTS" = "false" ]; then
          jq -n --argjson desired "$desired" '{"status":"create","desired":$desired}' > /tmp/plan-parts/realtime.json
          echo "::notice::Realtime config: will be created with project"
          exit 0
        fi

        current_result=$(curl -s -w "\n%{http_code}" -H "$auth" "$api/projects/$PROJECT_REF/config/realtime")
        current_code=$(echo "$current_result" | tail -1)
        current_body=$(echo "$current_result" | sed '$d')

        if [ "$current_code" -ne 200 ]; then
          echo "::error::Failed to fetch current realtime config (HTTP $current_code)"
          echo "$current_body"
          exit 1
        fi

        current_trimmed=$(echo "$current_body" | jq -S --argjson d "$desired" '
          . as $full | $d | keys_unsorted | reduce .[] as $k ({}; . + {($k): $full[$k]})')

        if [ "$desired" = "$current_trimmed" ]; then
          echo "::notice::Realtime config: no changes"
          if [ "$MODE" = "plan" ]; then
            echo '{"status":"no-change"}' > /tmp/plan-parts/realtime.json
          fi
          exit 0
        fi

        diff_json=$(jq -n --argjson desired "$desired" --argjson current "$current_trimmed" '
          [$desired | keys[] | select($desired[.] != $current[.])] |
          reduce .[] as $k ({}; . + {($k): {"current": $current[$k], "desired": $desired[$k]}})')

        if [ "$MODE" = "plan" ]; then
          jq -n --argjson diff "$diff_json" '{"status":"changed","diff":$diff}' > /tmp/plan-parts/realtime.json
          echo "::notice::Realtime config: changes detected (plan mode, not applying)"
          exit 0
        fi

        result=$(curl -s -w "\n%{http_code}" \
          -X PATCH -H "$auth" -H "Content-Type: application/json" \
          -d "$desired" "$api/projects/$PROJECT_REF/config/realtime")

        code=$(echo "$result" | tail -1)
        body=$(echo "$result" | sed '$d')

        if [ "$code" -eq 200 ]; then
          echo "::notice::Realtime config applied successfully"
        else
          echo "::error::Failed to apply realtime config (HTTP $code)"
          echo "$body"
          exit 1
        fi

    # ── Step 7: Storage config ───────────────────────────────────────────
    - name: Apply storage config
      if: ${{ hashFiles(format('{0}/storage-config.json', inputs.config_dir)) != '' && inputs.delete != 'true' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
        CONFIG_DIR: ${{ inputs.config_dir }}
        MODE: ${{ inputs.mode }}
      run: |
        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"
        desired=$(jq -S '.' "${CONFIG_DIR}/storage-config.json")

        if [ "$MODE" = "plan" ] && [ "$PROJECT_EXISTS" = "false" ]; then
          jq -n --argjson desired "$desired" '{"status":"create","desired":$desired}' > /tmp/plan-parts/storage-config.json
          echo "::notice::Storage config: will be created with project"
          exit 0
        fi

        current_result=$(curl -s -w "\n%{http_code}" -H "$auth" "$api/projects/$PROJECT_REF/config/storage")
        current_code=$(echo "$current_result" | tail -1)
        current_body=$(echo "$current_result" | sed '$d')

        if [ "$current_code" -ne 200 ]; then
          echo "::error::Failed to fetch current storage config (HTTP $current_code)"
          echo "$current_body"
          exit 1
        fi

        current_trimmed=$(echo "$current_body" | jq -S --argjson d "$desired" '
          . as $full | $d | keys_unsorted | reduce .[] as $k ({}; . + {($k): $full[$k]})')

        if [ "$desired" = "$current_trimmed" ]; then
          echo "::notice::Storage config: no changes"
          if [ "$MODE" = "plan" ]; then
            echo '{"status":"no-change"}' > /tmp/plan-parts/storage-config.json
          fi
          exit 0
        fi

        diff_json=$(jq -n --argjson desired "$desired" --argjson current "$current_trimmed" '
          [$desired | keys[] | select($desired[.] != $current[.])] |
          reduce .[] as $k ({}; . + {($k): {"current": $current[$k], "desired": $desired[$k]}})')

        if [ "$MODE" = "plan" ]; then
          jq -n --argjson diff "$diff_json" '{"status":"changed","diff":$diff}' > /tmp/plan-parts/storage-config.json
          echo "::notice::Storage config: changes detected (plan mode, not applying)"
          exit 0
        fi

        result=$(curl -s -w "\n%{http_code}" \
          -X PATCH -H "$auth" -H "Content-Type: application/json" \
          -d "$desired" "$api/projects/$PROJECT_REF/config/storage")

        code=$(echo "$result" | tail -1)
        body=$(echo "$result" | sed '$d')

        if [ "$code" -eq 200 ]; then
          echo "::notice::Storage config applied successfully"
        else
          echo "::error::Failed to apply storage config (HTTP $code)"
          echo "$body"
          exit 1
        fi

    # ── Step 8: SQL migrations ───────────────────────────────────────────
    - name: Run SQL migrations
      if: ${{ inputs.schema_dir != '' && hashFiles(format('{0}/*.sql', inputs.schema_dir)) != '' && inputs.delete != 'true' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
        SCHEMA_DIR: ${{ inputs.schema_dir }}
        MODE: ${{ inputs.mode }}
      run: |
        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"

        # Plan mode: project doesn't exist → list all .sql files as pending
        if [ "$MODE" = "plan" ] && [ "$PROJECT_EXISTS" = "false" ]; then
          pending=()
          for file in $(ls -1 "${SCHEMA_DIR}"/*.sql 2>/dev/null | sort); do
            pending+=("$(basename "$file")")
          done
          if [ ${#pending[@]} -eq 0 ]; then
            echo '{"status":"no-change"}' > /tmp/plan-parts/migrations.json
          else
            pending_json=$(printf '%s\n' "${pending[@]}" | jq -R . | jq -s .)
            jq -n --argjson pending "$pending_json" '{"status":"pending","pending":$pending}' > /tmp/plan-parts/migrations.json
            echo "::notice::SQL migrations: ${#pending[@]} will be applied after project creation"
          fi
          exit 0
        fi

        # Ensure migrations tracking table exists
        init_sql="CREATE TABLE IF NOT EXISTS public._supabase_admin_migrations (
          name TEXT PRIMARY KEY,
          applied_at TIMESTAMPTZ DEFAULT now()
        );"

        curl -s -w "\n%{http_code}" \
          -X POST \
          -H "$auth" \
          -H "Content-Type: application/json" \
          -d "$(jq -n --arg q "$init_sql" '{query: $q}')" \
          "$api/projects/$PROJECT_REF/database/query" > /dev/null

        # Get already-applied migrations
        applied_result=$(curl -s \
          -X POST \
          -H "$auth" \
          -H "Content-Type: application/json" \
          -d '{"query": "SELECT name FROM public._supabase_admin_migrations ORDER BY name"}' \
          "$api/projects/$PROJECT_REF/database/query")

        applied_names=$(echo "$applied_result" | jq -r '.[].name // empty' 2>/dev/null || echo "")

        # Find pending migrations
        pending=()
        for file in $(ls -1 "${SCHEMA_DIR}"/*.sql 2>/dev/null | sort); do
          name=$(basename "$file")
          if ! echo "$applied_names" | grep -qxF "$name"; then
            pending+=("$name")
          fi
        done

        if [ ${#pending[@]} -eq 0 ]; then
          echo "::notice::SQL migrations: no pending migrations"
          if [ "$MODE" = "plan" ]; then
            echo '{"status":"no-change"}' > /tmp/plan-parts/migrations.json
          fi
          exit 0
        fi

        # In plan mode, just report pending migrations
        if [ "$MODE" = "plan" ]; then
          pending_json=$(printf '%s\n' "${pending[@]}" | jq -R . | jq -s .)
          jq -n --argjson pending "$pending_json" '{"status":"pending","pending":$pending}' > /tmp/plan-parts/migrations.json
          echo "::notice::SQL migrations: ${#pending[@]} pending (plan mode, not applying)"
          exit 0
        fi

        # Apply pending migrations
        failed=0
        applied=0
        skipped=0

        for file in $(ls -1 "${SCHEMA_DIR}"/*.sql 2>/dev/null | sort); do
          name=$(basename "$file")

          if echo "$applied_names" | grep -qxF "$name"; then
            echo "  Skipping $name (already applied)"
            skipped=$((skipped + 1))
            continue
          fi

          echo "  Applying $name..."
          sql=$(cat "$file")

          result=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "$auth" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg q "$sql" '{query: $q}')" \
            "$api/projects/$PROJECT_REF/database/query")

          code=$(echo "$result" | tail -1)
          body=$(echo "$result" | sed '$d')

          if [ "$code" -eq 200 ] || [ "$code" -eq 201 ]; then
            record_sql="INSERT INTO public._supabase_admin_migrations (name) VALUES ('${name//\'/\'\'}');"
            curl -s \
              -X POST \
              -H "$auth" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg q "$record_sql" '{query: $q}')" \
              "$api/projects/$PROJECT_REF/database/query" > /dev/null

            echo "    $name applied successfully"
            applied=$((applied + 1))
          else
            echo "::error::Migration $name failed (HTTP $code)"
            echo "$body"
            failed=$((failed + 1))
          fi
        done

        echo "::notice::Migrations complete: $applied applied, $skipped skipped, $failed failed"

        if [ "$failed" -gt 0 ]; then
          exit 1
        fi

    # ── Step 9: Storage buckets ──────────────────────────────────────────
    - name: Create storage buckets
      if: ${{ hashFiles(format('{0}/storage.json', inputs.config_dir)) != '' && inputs.delete != 'true' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
        CONFIG_DIR: ${{ inputs.config_dir }}
        MODE: ${{ inputs.mode }}
      run: |
        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"

        buckets=$(cat "${CONFIG_DIR}/storage.json" | jq -c '.buckets[]')

        # Plan mode: project doesn't exist → mark all buckets as create
        if [ "$MODE" = "plan" ] && [ "$PROJECT_EXISTS" = "false" ]; then
          bucket_plans=$(cat "${CONFIG_DIR}/storage.json" | jq '[.buckets[] | {name, action: "create"}]')
          if [ "$(echo "$bucket_plans" | jq length)" -eq 0 ]; then
            echo '{"status":"no-change"}' > /tmp/plan-parts/storage-buckets.json
          else
            jq -n --argjson buckets "$bucket_plans" '{"status":"changed","buckets":$buckets}' > /tmp/plan-parts/storage-buckets.json
            echo "::notice::Storage buckets: will be created with project"
          fi
          exit 0
        fi

        # Get existing buckets
        existing=$(curl -s -H "$auth" "$api/projects/$PROJECT_REF/storage/buckets")

        bucket_plans="[]"
        has_bucket_changes=false

        while IFS= read -r bucket; do
          name=$(echo "$bucket" | jq -r '.name')
          bucket_exists=$(echo "$existing" | jq -r --arg n "$name" '.[] | select(.name == $n) | .name // empty')

          if [ -n "$bucket_exists" ]; then
            # Check for differences on existing bucket
            existing_bucket=$(echo "$existing" | jq --arg n "$name" '.[] | select(.name == $n)')
            desired_public=$(echo "$bucket" | jq '.public // false')
            current_public=$(echo "$existing_bucket" | jq '.public // false')
            desired_size=$(echo "$bucket" | jq '.file_size_limit // null')
            current_size=$(echo "$existing_bucket" | jq '.file_size_limit // null')
            desired_mime=$(echo "$bucket" | jq -S '.allowed_mime_types // null')
            current_mime=$(echo "$existing_bucket" | jq -S '.allowed_mime_types // null')

            changes="{}"
            if [ "$desired_public" != "$current_public" ]; then
              changes=$(echo "$changes" | jq --argjson c "$current_public" --argjson d "$desired_public" '. + {public: {current: $c, desired: $d}}')
            fi
            if [ "$desired_size" != "$current_size" ]; then
              changes=$(echo "$changes" | jq --argjson c "$current_size" --argjson d "$desired_size" '. + {file_size_limit: {current: $c, desired: $d}}')
            fi
            if [ "$desired_mime" != "$current_mime" ]; then
              changes=$(echo "$changes" | jq --argjson c "$current_mime" --argjson d "$desired_mime" '. + {allowed_mime_types: {current: $c, desired: $d}}')
            fi

            if [ "$changes" != "{}" ]; then
              has_bucket_changes=true
              bucket_plans=$(echo "$bucket_plans" | jq --arg n "$name" --argjson c "$changes" '. + [{"name":$n,"action":"update","changes":$c}]')
            fi
          else
            has_bucket_changes=true
            bucket_plans=$(echo "$bucket_plans" | jq --arg n "$name" '. + [{"name":$n,"action":"create"}]')
          fi
        done <<< "$buckets"

        if [ "$has_bucket_changes" = false ]; then
          echo "::notice::Storage buckets: no changes"
          if [ "$MODE" = "plan" ]; then
            echo '{"status":"no-change"}' > /tmp/plan-parts/storage-buckets.json
          fi
          exit 0
        fi

        if [ "$MODE" = "plan" ]; then
          jq -n --argjson buckets "$bucket_plans" '{"status":"changed","buckets":$buckets}' > /tmp/plan-parts/storage-buckets.json
          echo "::notice::Storage buckets: changes detected (plan mode, not applying)"
          exit 0
        fi

        # Apply bucket changes
        created=0
        updated=0
        failed=0

        while IFS= read -r bucket; do
          name=$(echo "$bucket" | jq -r '.name')
          bucket_exists=$(echo "$existing" | jq -r --arg n "$name" '.[] | select(.name == $n) | .name // empty')

          if [ -n "$bucket_exists" ]; then
            result=$(curl -s -w "\n%{http_code}" \
              -X PUT -H "$auth" -H "Content-Type: application/json" \
              -d "$bucket" "$api/projects/$PROJECT_REF/storage/buckets/$name")

            code=$(echo "$result" | tail -1)
            body=$(echo "$result" | sed '$d')

            if [ "$code" -eq 200 ]; then
              echo "  Bucket '$name' updated"
              updated=$((updated + 1))
            else
              echo "::error::Failed to update bucket '$name' (HTTP $code)"
              echo "$body"
              failed=$((failed + 1))
            fi
          else
            result=$(curl -s -w "\n%{http_code}" \
              -X POST -H "$auth" -H "Content-Type: application/json" \
              -d "$bucket" "$api/projects/$PROJECT_REF/storage/buckets")

            code=$(echo "$result" | tail -1)
            body=$(echo "$result" | sed '$d')

            if [ "$code" -eq 200 ] || [ "$code" -eq 201 ]; then
              echo "  Bucket '$name' created"
              created=$((created + 1))
            else
              echo "::error::Failed to create bucket '$name' (HTTP $code)"
              echo "$body"
              failed=$((failed + 1))
            fi
          fi
        done <<< "$buckets"

        echo "::notice::Storage buckets: $created created, $updated updated, $failed failed"

        if [ "$failed" -gt 0 ]; then
          exit 1
        fi

    # ── Step 10: Push secrets ────────────────────────────────────────────
    - name: Push secrets
      if: ${{ inputs.secrets_file != '' && hashFiles(inputs.secrets_file) != '' && inputs.mode != 'plan' && inputs.delete != 'true' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
        SECRETS_INLINE: ${{ inputs.secrets }}
        SECRETS_FILE: ${{ inputs.secrets_file }}
      run: |
        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"

        # Inline secrets input takes precedence over secrets_file
        if [ -n "$SECRETS_INLINE" ]; then
          secrets_json="$SECRETS_INLINE"
        else
          secrets_json=$(cat "$SECRETS_FILE")
        fi

        # Transform {"KEY": "value", ...} into [{"name": "KEY", "value": "value"}, ...]
        payload=$(echo "$secrets_json" | jq '[to_entries[] | {name: .key, value: .value}]')
        count=$(echo "$payload" | jq length)

        result=$(curl -s -w "\n%{http_code}" \
          -X POST \
          -H "$auth" \
          -H "Content-Type: application/json" \
          -d "$payload" \
          "$api/projects/$PROJECT_REF/secrets")

        code=$(echo "$result" | tail -1)
        body=$(echo "$result" | sed '$d')

        if [ "$code" -eq 200 ] || [ "$code" -eq 201 ]; then
          echo "::notice::$count secret(s) pushed successfully"
        else
          echo "::error::Failed to push secrets (HTTP $code)"
          echo "$body"
          exit 1
        fi

    # Report secrets presence in plan mode (show key names, never values)
    - name: Plan secrets
      if: ${{ inputs.secrets_file != '' && hashFiles(inputs.secrets_file) != '' && inputs.mode == 'plan' && inputs.delete != 'true' }}
      shell: bash
      env:
        SECRETS_INLINE: ${{ inputs.secrets }}
        SECRETS_FILE: ${{ inputs.secrets_file }}
      run: |
        if [ -n "$SECRETS_INLINE" ]; then
          secrets_json="$SECRETS_INLINE"
        else
          secrets_json=$(cat "$SECRETS_FILE")
        fi

        count=$(echo "$secrets_json" | jq 'keys | length')
        key_names=$(echo "$secrets_json" | jq '[keys[]]')
        jq -n --argjson count "$count" --argjson keys "$key_names" \
          '{"status":"present","key_count":$count,"keys":$keys,"note":"Secret values are not diffed. Apply to sync."}' \
          > /tmp/plan-parts/secrets.json
        echo "::notice::Secrets: $count key(s) present — $(echo "$key_names" | jq -r 'join(", ")') (values not diffed in plan mode)"

    # ── Step 11: Deploy edge functions ───────────────────────────────────
    - name: Deploy edge functions
      if: ${{ inputs.functions_dir != '' && hashFiles(format('{0}/*/index.ts', inputs.functions_dir)) != '' && inputs.delete != 'true' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
        FUNCTIONS_DIR: ${{ inputs.functions_dir }}
        MODE: ${{ inputs.mode }}
      run: |
        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"

        # Plan mode: project doesn't exist → mark all functions as create
        if [ "$MODE" = "plan" ] && [ "$PROJECT_EXISTS" = "false" ]; then
          func_plans="[]"
          for func_dir in "${FUNCTIONS_DIR}"/*/; do
            [ -d "$func_dir" ] || continue
            func_name=$(basename "$func_dir")
            [ -f "${func_dir}index.ts" ] || continue
            func_plans=$(echo "$func_plans" | jq --arg n "$func_name" '. + [{"name":$n,"action":"create"}]')
          done
          if [ "$(echo "$func_plans" | jq length)" -eq 0 ]; then
            echo '{"status":"no-change"}' > /tmp/plan-parts/functions.json
          else
            jq -n --argjson funcs "$func_plans" '{"status":"changed","functions":$funcs}' > /tmp/plan-parts/functions.json
            echo "::notice::Edge functions: will be deployed with project"
          fi
          exit 0
        fi

        # Get existing functions list
        existing_funcs=$(curl -s -H "$auth" "$api/projects/$PROJECT_REF/functions")

        func_plans="[]"
        has_func_changes=false

        for func_dir in "${FUNCTIONS_DIR}"/*/; do
          [ -d "$func_dir" ] || continue
          func_name=$(basename "$func_dir")
          entry_file="${func_dir}index.ts"
          [ -f "$entry_file" ] || continue

          func_exists=$(echo "$existing_funcs" | jq -r --arg n "$func_name" '.[] | select(.slug == $n) | .slug // empty' 2>/dev/null)

          # Read per-function config for plan output
          verify_jwt=true
          func_config="${func_dir}config.json"
          if [ -f "$func_config" ]; then
            jwt_val=$(jq -r '.verify_jwt // empty' "$func_config")
            if [ "$jwt_val" = "false" ]; then
              verify_jwt=false
            fi
          fi

          if [ -n "$func_exists" ]; then
            action="update"
          else
            action="create"
            has_func_changes=true
          fi

          # For existing functions, always mark as update (we can't diff body via API)
          if [ "$action" = "update" ]; then
            has_func_changes=true
          fi

          func_plans=$(echo "$func_plans" | jq --arg n "$func_name" --arg a "$action" --argjson jwt "$verify_jwt" '. + [{"name":$n,"action":$a,"verify_jwt":$jwt}]')
        done

        if [ "$has_func_changes" = false ]; then
          echo "::notice::Edge functions: no changes"
          if [ "$MODE" = "plan" ]; then
            echo '{"status":"no-change"}' > /tmp/plan-parts/functions.json
          fi
          exit 0
        fi

        if [ "$MODE" = "plan" ]; then
          jq -n --argjson funcs "$func_plans" '{"status":"changed","functions":$funcs}' > /tmp/plan-parts/functions.json
          echo "::notice::Edge functions: changes detected (plan mode, not applying)"
          exit 0
        fi

        # Apply
        deployed=0
        failed=0

        for func_dir in "${FUNCTIONS_DIR}"/*/; do
          [ -d "$func_dir" ] || continue
          func_name=$(basename "$func_dir")
          entry_file="${func_dir}index.ts"
          [ -f "$entry_file" ] || continue

          echo "  Deploying function: $func_name"

          # Read per-function config (verify_jwt defaults to true)
          verify_jwt=true
          func_config="${func_dir}config.json"
          if [ -f "$func_config" ]; then
            jwt_val=$(jq -r '.verify_jwt // empty' "$func_config")
            if [ "$jwt_val" = "false" ]; then
              verify_jwt=false
            fi
          fi

          check=$(curl -s -w "\n%{http_code}" -H "$auth" "$api/projects/$PROJECT_REF/functions/$func_name")
          check_code=$(echo "$check" | tail -1)

          if [ "$check_code" -eq 200 ]; then
            result=$(curl -s -w "\n%{http_code}" \
              -X PATCH -H "$auth" -H "Content-Type: application/json" \
              -d "$(jq -n --arg body "$(cat "$entry_file")" --arg name "$func_name" --argjson jwt "$verify_jwt" '{name: $name, body: $body, verify_jwt: $jwt}')" \
              "$api/projects/$PROJECT_REF/functions/$func_name")
          else
            result=$(curl -s -w "\n%{http_code}" \
              -X POST -H "$auth" -H "Content-Type: application/json" \
              -d "$(jq -n --arg body "$(cat "$entry_file")" --arg name "$func_name" --argjson jwt "$verify_jwt" '{name: $name, slug: $name, body: $body, verify_jwt: $jwt}')" \
              "$api/projects/$PROJECT_REF/functions")
          fi

          code=$(echo "$result" | tail -1)
          body=$(echo "$result" | sed '$d')

          if [ "$code" -eq 200 ] || [ "$code" -eq 201 ]; then
            echo "    $func_name deployed"
            deployed=$((deployed + 1))
          else
            echo "::error::Failed to deploy function '$func_name' (HTTP $code)"
            echo "$body"
            failed=$((failed + 1))
          fi
        done

        echo "::notice::Edge functions: $deployed deployed, $failed failed"

        if [ "$failed" -gt 0 ]; then
          exit 1
        fi

    # ── Step 12: Assemble plan output ────────────────────────────────────
    - name: Assemble plan output
      id: assemble-plan
      if: ${{ inputs.mode == 'plan' }}
      shell: bash
      env:
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
        PLAN_OUTPUT_FILE: ${{ inputs.plan_output_file }}
        PLAN_COMMENT_FILE: ${{ inputs.plan_comment_file }}
        PROJECT_NAME: ${{ inputs.project_name }}
        ENVIRONMENT: ${{ inputs.environment }}
      run: |
        # Extract project-level action from _project.json (written by determine-state)
        project_action="update"
        if [ -f /tmp/plan-parts/_project.json ]; then
          project_action=$(jq -r '.action' /tmp/plan-parts/_project.json)
          rm /tmp/plan-parts/_project.json
        fi

        # Merge all remaining plan parts into a single JSON object
        plan='{}'

        for part_file in /tmp/plan-parts/*.json; do
          [ -f "$part_file" ] || continue
          key=$(basename "$part_file" .json)
          value=$(cat "$part_file")
          plan=$(echo "$plan" | jq --arg k "$key" --argjson v "$value" '. + {($k): $v}')
        done

        # has_changes: true for create/delete, otherwise check sections
        if [ "$project_action" = "create" ] || [ "$project_action" = "delete" ]; then
          has_changes=true
        else
          has_changes=$(echo "$plan" | jq '[.[] | .status] | any(. != "no-change")')
        fi

        # Build final plan JSON
        final=$(jq -n \
          --arg ref "$PROJECT_REF" \
          --arg action "$project_action" \
          --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          --argjson changes "$plan" \
          --argjson has_changes "$has_changes" \
          '{project_ref: $ref, project_action: $action, timestamp: $ts, changes: $changes, has_changes: $has_changes}')

        echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"

        if [ -n "$PLAN_OUTPUT_FILE" ]; then
          echo "$final" > "$PLAN_OUTPUT_FILE"
          echo "::notice::Plan output written to $PLAN_OUTPUT_FILE"
        fi

        # Also write to step summary
        echo "## Supabase Plan" >> "$GITHUB_STEP_SUMMARY"
        echo '```json' >> "$GITHUB_STEP_SUMMARY"
        echo "$final" | jq '.' >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"

        # Build markdown comment for PR posting
        if [ -n "$PLAN_COMMENT_FILE" ]; then
          comment="<!-- supa-plan:${PROJECT_REF} -->"$'\n'

          if [ -n "$PROJECT_NAME" ]; then
            header="$PROJECT_NAME"
          else
            header="$PROJECT_REF"
          fi
          if [ -n "$ENVIRONMENT" ]; then
            header="$header ($ENVIRONMENT)"
          fi

          if [ "$project_action" = "delete" ]; then
            comment+="## Supabase Plan: ${header}"$'\n'
            comment+="> :rotating_light: **This project will be DELETED on apply.**"$'\n\n'
          elif [ "$project_action" = "create" ]; then
            comment+="## Supabase Plan: ${header}"$'\n'
            comment+="> :seedling: **New project — all config will be created.**"$'\n\n'
          else
            comment+="## Supabase Plan: ${header}"$'\n\n'
          fi

          if [ "$has_changes" != "true" ] && [ "$project_action" = "update" ]; then
            comment+="Everything is up to date. No changes will be applied on merge."$'\n'
          else
            # Config sections with table diffs
            for section in auth postgrest realtime storage-config; do
              nice_name=""
              case "$section" in
                auth) nice_name="Auth Config" ;;
                postgrest) nice_name="PostgREST Config" ;;
                realtime) nice_name="Realtime Config" ;;
                storage-config) nice_name="Storage Config" ;;
              esac

              status=$(echo "$plan" | jq -r ".\"$section\".status // \"absent\"")

              if [ "$status" = "absent" ]; then
                continue
              elif [ "$status" = "no-change" ]; then
                comment+="### ${nice_name} — no changes"$'\n\n'
              elif [ "$status" = "changed" ]; then
                comment+="### ${nice_name} — :warning: changes detected"$'\n'
                comment+="| Key | Current | Desired |"$'\n'
                comment+="|-----|---------|---------|"$'\n'

                for k in $(echo "$plan" | jq -r ".$section.diff | keys[]"); do
                  current=$(echo "$plan" | jq -c ".$section.diff.\"$k\".current")
                  desired=$(echo "$plan" | jq -c ".$section.diff.\"$k\".desired")
                  comment+="| \`$k\` | \`$current\` | \`$desired\` |"$'\n'
                done
                comment+=$'\n'
              elif [ "$status" = "create" ]; then
                comment+="### ${nice_name} — :seedling: will be created"$'\n\n'
              fi
            done

            # Network restrictions
            net_status=$(echo "$plan" | jq -r '.network.status // "absent"')
            if [ "$net_status" != "absent" ]; then
              if [ "$net_status" = "no-change" ]; then
                comment+="### Network Restrictions — no changes"$'\n\n'
              elif [ "$net_status" = "changed" ]; then
                comment+="### Network Restrictions — :warning: changes detected"$'\n'
                comment+="| Key | Current | Desired |"$'\n'
                comment+="|-----|---------|---------|"$'\n'
                current=$(echo "$plan" | jq -c '.network.diff.dbAllowedCidrs.current')
                desired=$(echo "$plan" | jq -c '.network.diff.dbAllowedCidrs.desired')
                comment+="| \`dbAllowedCidrs\` | \`$current\` | \`$desired\` |"$'\n\n'
              elif [ "$net_status" = "create" ]; then
                comment+="### Network Restrictions — :seedling: will be created"$'\n\n'
              fi
            fi

            # SSL enforcement
            ssl_status=$(echo "$plan" | jq -r '.ssl.status // "absent"')
            if [ "$ssl_status" != "absent" ]; then
              if [ "$ssl_status" = "no-change" ]; then
                comment+="### SSL Enforcement — no changes"$'\n\n'
              elif [ "$ssl_status" = "changed" ]; then
                comment+="### SSL Enforcement — :warning: changes detected"$'\n'
                comment+="| Key | Current | Desired |"$'\n'
                comment+="|-----|---------|---------|"$'\n'
                current=$(echo "$plan" | jq -c '.ssl.diff.requestedConfig.current')
                desired=$(echo "$plan" | jq -c '.ssl.diff.requestedConfig.desired')
                comment+="| \`requestedConfig\` | \`$current\` | \`$desired\` |"$'\n\n'
              elif [ "$ssl_status" = "create" ]; then
                comment+="### SSL Enforcement — :seedling: will be created"$'\n\n'
              fi
            fi

            # Storage buckets
            buckets_status=$(echo "$plan" | jq -r '."storage-buckets".status // "absent"')
            if [ "$buckets_status" != "absent" ]; then
              if [ "$buckets_status" = "no-change" ]; then
                comment+="### Storage Buckets — no changes"$'\n\n'
              elif [ "$buckets_status" = "changed" ]; then
                comment+="### Storage Buckets — :warning: changes detected"$'\n'
                comment+="| Bucket | Action | Details |"$'\n'
                comment+="|--------|--------|---------|"$'\n'

                for row in $(echo "$plan" | jq -c '."storage-buckets".buckets[]'); do
                  bname=$(echo "$row" | jq -r '.name')
                  baction=$(echo "$row" | jq -r '.action')
                  if [ "$baction" = "create" ]; then
                    comment+="| \`$bname\` | **create** | — |"$'\n'
                  else
                    changes=$(echo "$row" | jq -c '.changes // {}' | sed 's/"/`/g')
                    comment+="| \`$bname\` | update | $changes |"$'\n'
                  fi
                done
                comment+=$'\n'
              elif [ "$buckets_status" = "create" ]; then
                comment+="### Storage Buckets — :seedling: will be created"$'\n\n'
              fi
            fi

            # SQL migrations
            mig_status=$(echo "$plan" | jq -r '.migrations.status // "absent"')
            if [ "$mig_status" != "absent" ]; then
              if [ "$mig_status" = "no-change" ]; then
                comment+="### SQL Migrations — no pending"$'\n\n'
              elif [ "$mig_status" = "pending" ]; then
                count=$(echo "$plan" | jq '.migrations.pending | length')
                comment+="### SQL Migrations — :warning: ${count} pending"$'\n'
                for m in $(echo "$plan" | jq -r '.migrations.pending[]'); do
                  comment+="- \`$m\`"$'\n'
                done
                comment+=$'\n'
              fi
            fi

            # Edge functions
            func_status=$(echo "$plan" | jq -r '.functions.status // "absent"')
            if [ "$func_status" != "absent" ]; then
              if [ "$func_status" = "no-change" ]; then
                comment+="### Edge Functions — no changes"$'\n\n'
              elif [ "$func_status" = "changed" ]; then
                comment+="### Edge Functions — :warning: changes detected"$'\n'
                comment+="| Function | Action |"$'\n'
                comment+="|----------|--------|"$'\n'
                for row in $(echo "$plan" | jq -c '.functions.functions[]'); do
                  fname=$(echo "$row" | jq -r '.name')
                  faction=$(echo "$row" | jq -r '.action')
                  if [ "$faction" = "create" ]; then
                    comment+="| \`$fname\` | **create** |"$'\n'
                  else
                    comment+="| \`$fname\` | update |"$'\n'
                  fi
                done
                comment+=$'\n'
              fi
            fi

            # Secrets
            sec_status=$(echo "$plan" | jq -r '.secrets.status // "absent"')
            if [ "$sec_status" = "present" ]; then
              sec_count=$(echo "$plan" | jq -r '.secrets.key_count')
              comment+="### Secrets — ${sec_count} key(s) present"$'\n'
              comment+="> Secret values are not diffed. Apply to sync."$'\n\n'
            fi

            comment+="---"$'\n'
            comment+="Comment \`/supa-apply\` to apply these changes, or \`/supa-plan\` to re-run the plan."$'\n'
          fi

          echo "$comment" > "$PLAN_COMMENT_FILE"
          echo "::notice::Plan comment written to $PLAN_COMMENT_FILE"
        fi

    # ── Step 13: Fetch and output project URL + API keys ─────────────────
    - name: Fetch project outputs
      id: fetch-outputs
      if: ${{ inputs.mode != 'plan' && inputs.delete != 'true' }}
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
        PROJECT_REF: ${{ steps.resolve-ref.outputs.project_ref }}
      run: |
        api="https://api.supabase.com/v1"
        auth="Authorization: Bearer $SUPABASE_ACCESS_TOKEN"

        # Fetch API keys
        keys_result=$(curl -s \
          -H "$auth" \
          "$api/projects/$PROJECT_REF/api-keys")

        anon_key=$(echo "$keys_result" | jq -r '.[] | select(.name == "anon") | .api_key // empty')
        service_role_key=$(echo "$keys_result" | jq -r '.[] | select(.name == "service_role") | .api_key // empty')

        project_url="https://${PROJECT_REF}.supabase.co"

        echo "project_url=$project_url" >> "$GITHUB_OUTPUT"
        echo "anon_key=$anon_key" >> "$GITHUB_OUTPUT"
        echo "service_role_key=$service_role_key" >> "$GITHUB_OUTPUT"

        # Mask keys in logs
        if [ -n "$anon_key" ]; then
          echo "::add-mask::$anon_key"
        fi
        if [ -n "$service_role_key" ]; then
          echo "::add-mask::$service_role_key"
        fi

        echo "::notice::Project outputs set (project_url, anon_key, service_role_key)"
